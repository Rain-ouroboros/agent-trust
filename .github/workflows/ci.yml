name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 4 * * 1"  # weekly: catch silent rot, not only pushes

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install "pytest>=8,<10"
      - name: Run tests
        run: pytest -q
      - name: Import every packaged module
        run: python -c "import importlib,pkgutil,agent_trust; [importlib.import_module(m.name) for m in pkgutil.walk_packages(agent_trust.__path__, agent_trust.__name__ + '.')]; print('all imports ok')"
      - name: README API smoke check
        run: python -c "from agent_trust import check_prompt; v=check_prompt('rm -rf /'); assert v.quarantined and 'destructive_shell_command_boundary' in v.boundary_matches"
      - name: Dependency consistency
        run: pip check
